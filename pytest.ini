[pytest]

# --- Paths ---
pythonpath = .
testpaths = tests

# --- Output ---
addopts =
    -v
    -ra
    --tb=short
    --strict-markers

# --- Async ---
asyncio_mode = auto

# --- Test categorization  ---
markers =
    unit: lógica pura sin dependencias externas
    integration: flujo con crypto y/o red real

# --- Logging ---
log_cli = true
log_cli_level = INFO

# --- Warnings ---
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning